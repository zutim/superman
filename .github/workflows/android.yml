name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          cd android_app
          # Create missing platforms but it overwrites main.dart
          flutter create . --platforms=android --overwrite
          
          # We MUST restore our custom main.dart and pubspec.yaml that flutter create just destroyed
          git checkout -- lib/main.dart pubspec.yaml android/app/src/main/AndroidManifest.xml
          
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Superman-Android-APK
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
